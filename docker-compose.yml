services:
  db:
    image: postgres:16-alpine
    container_name: despacho_db
    environment:
      POSTGRES_DB: despacho
      POSTGRES_USER: despacho
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-despacho_secret}
    volumes:
      - despacho_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U despacho"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: despacho_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://despacho:${POSTGRES_PASSWORD:-despacho_secret}@db:5432/despacho
      UPLOAD_DIR: /app/uploads
      APP_ENV: production
    volumes:
      - despacho_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: despacho_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  despacho_uploads:
  despacho_pgdata:
